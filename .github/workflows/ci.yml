name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # package-lock.json is gitignored (see DOCKER.md), so `npm ci` isn't available here.
      - run: npm install
      - run: npm test
      - run: npm run build
