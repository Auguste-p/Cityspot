name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # package-lock.json is gitignored (see MANUEL_DEPLOIEMENT.md), so `npm ci` isn't available here.
      - run: npm install
      # Fails the build on high/critical vulnerabilities (OWASP A06, see SECURITE.md).
      - run: npm audit --audit-level=high
      # `test:coverage` runs the full suite (same pass/fail as `npm test`) and
      # additionally produces the coverage report uploaded below.
      - run: npm run test:coverage
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
